services:
  postgres:
    image: postgres:16
    container_name: unio-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: unio
      POSTGRES_USER: unio
      POSTGRES_PASSWORD: unio
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: unio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
